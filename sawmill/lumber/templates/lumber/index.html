{% extends 'base.html' %}

{% block content %}
    {% for post in posts %}
        <div class="post-card">
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <p><a href="{% url 'post' post.id %}" class="btn">Подробнее</a></p>
            {% if not forloop.last %}<hr>{% endif %}
        </div>
    {% empty %}
        <p class="empty-message">В данный момент товаров нет.</p>
    {% endfor %}
{% endblock %}

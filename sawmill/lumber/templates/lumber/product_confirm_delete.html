{% extends 'base.html' %}

{% block content %}
    <div class="form-card">
        <h2>Удаление товара</h2>
        <p>Вы действительно хотите удалить товар «{{ post.title }}»?</p>

        <form method="post" class="site-form">
            {% csrf_token %}
            <button type="submit" class="btn">Удалить</button>
            <a class="btn" href="{{ post.get_absolute_url }}">Отмена</a>
        </form>
    </div>
{% endblock %}

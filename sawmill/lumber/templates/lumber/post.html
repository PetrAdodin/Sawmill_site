{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <div class="post-card">
        {% with post.tags.all as tags %}
            {% if tags %}
                <div class="post-tags">
                    <strong>Теги:</strong>
                    <ul class="tags-list">
                        {% for t in tags %}
                            <li><a href="{{ t.get_absolute_url }}">{{ t.name }}</a></li>
                        {% endfor %}
                    </ul>
                </div>
            {% endif %}
        {% endwith %}
        <p>{{ post.content }}</p>
        <p><a href="{% url 'home' %}" class="btn">На главную</a></p>
    </div>
{% endblock %}

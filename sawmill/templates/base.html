{% load static %}
{% load lumber_tags %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{{ title }}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'lumber/css/style.css' %}">
</head>
<body>
<div class="container">
    <nav class="nav-menu">
        {% for item in menu %}
            <a href="{% url item.url_name %}">{{ item.title }}</a>
        {% endfor %}
    </nav>

    <aside class="sidebar">
        <div class="sidebar-section">
            <h3>Категории</h3>
            {% show_categories %}
        </div>

        <div class="sidebar-section">
            <h3>Теги</h3>
            {% show_all_tags %}
        </div>
    </aside>

    <main class="content">
        <h1>{% block heading %}{{ title }}{% endblock %}</h1>

        {% block content %}
        {% endblock %}
    </main>
</div>
</body>
</html>
